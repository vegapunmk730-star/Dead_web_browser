<!DOCTYPE html>
<html lang="pt">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dead Web Navigator</title>
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:#05050a; --s1:#0d0d18; --s2:#111120;
      --border:rgba(99,179,237,.1); --border2:rgba(99,179,237,.28);
      --accent:#63b3ed; --accent-d:rgba(99,179,237,.12);
      --green:#68d391; --amber:#f6ad55; --red:#fc8181;
      --text:#e2e8f0; --dim:#a0aec0; --muted:#4a5568;
      --mono:'Space Mono',monospace; --sans:'Syne',sans-serif;
    }
    *{box-sizing:border-box;margin:0;padding:0}
    body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:40px 20px}
    .grid{position:fixed;inset:0;z-index:0;background-image:linear-gradient(rgba(99,179,237,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,179,237,.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
    .glow{position:fixed;inset:0;z-index:0;background:radial-gradient(ellipse 70% 45% at 50% 0%,rgba(99,179,237,.06) 0%,transparent 70%);pointer-events:none}
    .wrap{position:relative;z-index:1;width:100%;max-width:640px}
    .header{text-align:center;margin-bottom:44px}
    .eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:.25em;color:var(--muted);margin-bottom:18px}
    h1{font-family:var(--sans);font-weight:800;font-size:clamp(38px,9vw,76px);line-height:.93;letter-spacing:-.03em;background:linear-gradient(135deg,#cbd5e0 20%,#63b3ed 55%,#a78bfa 90%);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:10px}
    h1 span{font-weight:400;font-size:.52em;opacity:.6}
    .sub{font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:.04em}
    .search-row{display:flex;gap:8px;margin-bottom:10px}
    .url-wrap{flex:1;position:relative}
    .prefix{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:12px;color:var(--muted);pointer-events:none}
    input{width:100%;padding:15px 14px 15px 82px;background:var(--s1);border:1px solid var(--border);border-radius:8px;color:var(--text);font-family:var(--mono);font-size:14px;transition:border-color .2s,box-shadow .2s}
    input:focus{outline:none;border-color:var(--border2);box-shadow:0 0 0 3px rgba(99,179,237,.07)}
    .btn{padding:0 22px;background:var(--accent-d);border:1px solid var(--border2);border-radius:8px;color:var(--accent);font-family:var(--mono);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;letter-spacing:.05em;flex-shrink:0}
    .btn:hover{background:rgba(99,179,237,.2)}
    .btn:disabled{color:var(--muted);cursor:not-allowed}
    .modes{display:flex;gap:6px;margin-bottom:10px}
    .mode-btn{padding:5px 14px;background:var(--s1);border:1px solid var(--border);border-radius:5px;cursor:pointer;transition:all .15s;color:var(--muted);font-family:var(--mono);font-size:11px}
    .mode-btn.active{background:rgba(104,211,145,.1);border-color:rgba(104,211,145,.4);color:var(--green)}
    .mode-btn.raw.active{background:rgba(246,173,85,.1);border-color:rgba(246,173,85,.4);color:var(--amber)}
    .status{margin-top:10px;padding:8px 14px;background:var(--s1);border:1px solid var(--border);border-radius:6px;display:flex;align-items:center;gap:10px;font-family:var(--mono);font-size:12px;color:var(--muted)}
    .status.success{border-color:rgba(104,211,145,.3);color:var(--green)}
    .status.error{border-color:rgba(252,129,129,.3);color:var(--red)}
    .status.hidden{display:none}
    .conf-bar-wrap{margin-top:8px;display:flex;align-items:center;gap:10px}
    .conf-bar-track{flex:1;height:2px;background:rgba(255,255,255,.05);border-radius:2px;overflow:hidden}
    .conf-bar-fill{height:100%;border-radius:2px;transition:width 1.2s ease}
    .conf-label{font-family:var(--mono);font-size:11px;min-width:48px}
    .timeline{display:flex;align-items:center;gap:10px;overflow-x:auto;padding-bottom:2px;margin-top:14px}
    .tl-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;flex-shrink:0}
    .tl-track{display:flex;align-items:center;gap:0;position:relative;flex:1}
    .tl-line{position:absolute;top:50%;left:0;right:0;height:1px;background:var(--border);transform:translateY(-50%)}
    .tl-btn{position:relative;z-index:1;padding:3px 10px;margin:0 2px;background:var(--s1);border:1px solid var(--border);border-radius:4px;cursor:pointer;transition:all .15s;color:var(--muted);font-family:var(--mono);font-size:11px;flex-shrink:0}
    .tl-btn.active{background:rgba(99,179,237,.16);border-color:var(--accent);color:var(--accent)}
    .result-card{margin-top:14px;background:var(--s1);border:1px solid var(--border);border-radius:10px;overflow:hidden;animation:fadeUp .35s ease}
    .result-header{padding:12px 14px;border-bottom:1px solid var(--border);display:flex;align-items:center;gap:10px;flex-wrap:wrap}
    .chip{font-family:var(--mono);font-size:10px;padding:2px 8px;border-radius:3px;letter-spacing:.06em;flex-shrink:0}
    .chip-green{color:var(--green);background:rgba(104,211,145,.08);border:1px solid rgba(104,211,145,.2)}
    .chip-accent{color:var(--accent);background:var(--accent-d);border:1px solid var(--border2)}
    .result-url{font-family:var(--mono);font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .view-btn{padding:7px 18px;background:var(--accent);border:none;border-radius:6px;color:#05050a;font-family:var(--mono);font-size:12px;font-weight:700;cursor:pointer;flex-shrink:0}
    .semantic-grid{display:flex;gap:16px;flex-wrap:wrap;padding:10px 14px;background:rgba(99,179,237,.02);border-top:1px solid var(--border)}
    .sem-item label{display:block;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:.1em}
    .sem-item span{font-family:var(--mono);font-size:12px;color:var(--dim)}
    .score-row{display:flex;gap:6px;flex-wrap:wrap;padding:8px 14px}
    .score-chip{font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:3px}
    .examples{margin-top:26px}
    .examples-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;margin-bottom:10px}
    .examples-chips{display:flex;flex-wrap:wrap;gap:6px}
    .ex-chip{padding:5px 12px;background:var(--s1);border:1px solid var(--border);border-radius:5px;color:var(--muted);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
    .ex-chip:hover{color:var(--accent);border-color:var(--border2)}
    .history{margin-top:28px}
    .history-label{font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.12em;margin-bottom:10px}
    .hist-item{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--s1);border:1px solid var(--border);border-radius:6px;cursor:pointer;margin-bottom:5px;transition:border-color .15s;width:100%;text-align:left}
    .hist-item:hover{border-color:var(--border2)}
    .hist-url{font-family:var(--mono);font-size:11px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex:1}
    .viewer{position:fixed;inset:0;z-index:100;background:var(--bg);display:flex;flex-direction:column}
    .viewer.hidden{display:none}
    .viewer-bar{display:flex;align-items:center;gap:10px;padding:9px 16px;background:var(--s1);border-bottom:1px solid var(--border);flex-shrink:0;flex-wrap:wrap}
    .back-btn{padding:5px 12px;background:transparent;border:1px solid var(--border);border-radius:5px;color:var(--dim);font-family:var(--mono);font-size:11px;cursor:pointer;transition:all .15s}
    .back-btn:hover{border-color:var(--border2);color:var(--accent)}
    .archive-link{padding:5px 12px;background:var(--accent-d);border:1px solid var(--border2);border-radius:5px;color:var(--accent);font-family:var(--mono);font-size:11px;text-decoration:none;flex-shrink:0}
    .viewer-url{font-family:var(--mono);font-size:11px;color:var(--muted);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
    iframe{flex:1;border:none;background:#fff}
    .footer{margin-top:56px;font-family:var(--mono);font-size:10px;color:var(--muted);letter-spacing:.1em;text-align:center}
    @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
    @keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:none}}
    @keyframes glitch{0%,88%,100%{clip-path:none;transform:none}90%{clip-path:polygon(0 15%,100% 15%,100% 35%,0 35%);transform:translateX(-4px)}92%{clip-path:polygon(0 60%,100% 60%,100% 80%,0 80%);transform:translateX(4px)}95%{clip-path:none;transform:none}}
    .glitch{animation:glitch 10s infinite}
    .pulse{animation:pulse 1s infinite}
    ::-webkit-scrollbar{width:4px}
    ::-webkit-scrollbar-thumb{background:rgba(99,179,237,.2);border-radius:2px}
  </style>
</head>
<body>
<div class="grid"></div>
<div class="glow"></div>

<!-- Page Viewer -->
<div class="viewer hidden" id="viewer">
  <div class="viewer-bar">
    <button class="back-btn" onclick="closeViewer()">← VOLTAR</button>
    <div style="width:1px;height:18px;background:var(--border)"></div>
    <span class="chip chip-green" id="viewer-year"></span>
    <span class="chip chip-accent" id="viewer-grade"></span>
    <span class="viewer-url" id="viewer-url"></span>
    <a class="archive-link" id="viewer-archive" target="_blank">ARQUIVO ↗</a>
  </div>
  <iframe id="viewer-frame" sandbox="allow-same-origin allow-forms" title="Recovered page"></iframe>
</div>

<!-- Main -->
<div class="wrap">
  <div class="header">
    <div class="eyebrow">◈ &nbsp; ARQUEOLOGIA DIGITAL &nbsp; ◈</div>
    <h1 class="glitch">DEAD WEB<br><span>NAVIGATOR</span></h1>
    <p class="sub">Recupera · Reconstrói · Preserva a internet morta</p>
  </div>

  <div class="search-row">
    <div class="url-wrap">
      <span class="prefix">https://</span>
      <input type="text" id="urlInput" placeholder="exemplo.com" onkeydown="if(event.key==='Enter')recover()"/>
    </div>
    <button class="btn" id="recoverBtn" onclick="recover()">RECUPERAR</button>
  </div>

  <div class="modes">
    <button class="mode-btn active" id="mode-historical" onclick="setMode('historical')">HISTÓRICO <span style="opacity:.5;font-size:10px">· AI repara</span></button>
    <button class="mode-btn raw" id="mode-raw" onclick="setMode('raw')">RAW <span style="opacity:.5;font-size:10px">· Sem AI</span></button>
  </div>

  <div class="status hidden" id="statusBox">
    <span id="statusIcon"></span>
    <span id="statusMsg"></span>
  </div>

  <div class="conf-bar-wrap" id="confWrap" style="display:none">
    <div class="conf-bar-track"><div class="conf-bar-fill" id="confFill"></div></div>
    <span class="conf-label" id="confLabel"></span>
  </div>

  <div class="timeline" id="timeline" style="display:none">
    <span class="tl-label">TIMELINE</span>
    <div class="tl-track" id="tlTrack"><div class="tl-line"></div></div>
  </div>

  <div class="result-card" id="resultCard" style="display:none">
    <div class="result-header">
      <span class="chip chip-green" id="resYear"></span>
      <span class="chip" id="resLayout" style="display:none"></span>
      <span class="chip chip-accent" id="resGrade" style="display:none"></span>
      <span class="result-url" id="resUrl"></span>
      <button class="view-btn" onclick="openViewer()">VER →</button>
    </div>
    <div class="semantic-grid" id="semGrid"></div>
    <div class="score-row" id="scoreRow"></div>
  </div>

  <div class="examples" id="examplesSection">
    <div class="examples-label">EXEMPLOS</div>
    <div class="examples-chips">
      <button class="ex-chip" onclick="quickRecover('sapo.pt')">sapo.pt</button>
      <button class="ex-chip" onclick="quickRecover('iol.pt')">iol.pt</button>
      <button class="ex-chip" onclick="quickRecover('clix.pt')">clix.pt</button>
      <button class="ex-chip" onclick="quickRecover('aeiou.pt')">aeiou.pt</button>
      <button class="ex-chip" onclick="quickRecover('record.pt')">record.pt</button>
      <button class="ex-chip" onclick="quickRecover('publico.pt')">publico.pt</button>
    </div>
  </div>

  <div class="history" id="historySection" style="display:none">
    <div class="history-label">HISTÓRICO</div>
    <div id="histList"></div>
  </div>

  <div class="footer">DEAD WEB NAVIGATOR v4.0 · INTERNET ARCHIVE + CLAUDE AI</div>
</div>

<script>
  const API = '';
  let currentMode = 'historical';
  let currentResult = null;
  let currentYear = null;

  // ── State ──────────────────────────────────────────────────────────────

  function setMode(mode) {
    currentMode = mode;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('mode-' + mode).classList.add('active');
  }

  function setStatus(type, msg) {
    const box = document.getElementById('statusBox');
    const icon = document.getElementById('statusIcon');
    const text = document.getElementById('statusMsg');
    box.className = 'status ' + type;
    icon.textContent = type === 'success' ? '✓' : type === 'error' ? '✕' : '●';
    if (type === 'loading') icon.className = 'pulse';
    else icon.className = '';
    text.textContent = msg;
  }

  function setConfidence(val) {
    if (val == null) return;
    const pct = Math.round(val * 100);
    const grade = pct>=85?'A':pct>=70?'B':pct>=55?'C':pct>=40?'D':'F';
    const color = pct>=75?'var(--green)':pct>=50?'var(--amber)':'var(--red)';
    document.getElementById('confWrap').style.display = 'flex';
    document.getElementById('confFill').style.width = pct + '%';
    document.getElementById('confFill').style.background = color;
    document.getElementById('confLabel').style.color = color;
    document.getElementById('confLabel').textContent = pct + '% ' + grade;
  }

  // ── Timeline ───────────────────────────────────────────────────────────

  async function fetchTimeline(url) {
    try {
      const r = await fetch(API + '/api/timeline?url=' + encodeURIComponent(url));
      const data = await r.json();
      const snaps = data.snapshots || [];
      const years = [...new Set(snaps.map(s => s.year))].sort();
      const track = document.getElementById('tlTrack');
      track.innerHTML = '<div class="tl-line"></div>';
      years.forEach(y => {
        const btn = document.createElement('button');
        btn.className = 'tl-btn' + (y === currentYear ? ' active' : '');
        btn.textContent = y;
        btn.onclick = () => recoverYear(y);
        track.appendChild(btn);
      });
      document.getElementById('timeline').style.display = years.length ? 'flex' : 'none';
    } catch(e) {}
  }

  // ── Recovery ───────────────────────────────────────────────────────────

  async function recover(url, year) {
    const input = document.getElementById('urlInput');
    const finalUrl = url || input.value.trim();
    if (!finalUrl) return;

    document.getElementById('recoverBtn').disabled = true;
    document.getElementById('examplesSection').style.display = 'none';
    document.getElementById('resultCard').style.display = 'none';
    document.getElementById('confWrap').style.display = 'none';
    setStatus('loading', 'A consultar Internet Archive...');

    fetchTimeline(finalUrl);

    try {
      setStatus('loading', 'A recuperar e reconstruir com IA...');
      let apiUrl = API + '/api/recover?url=' + encodeURIComponent(finalUrl) + '&mode=' + currentMode;
      if (year) apiUrl += '&year=' + year;

      const r = await fetch(apiUrl);
      if (!r.ok) {
        const err = await r.json();
        throw new Error(err.detail || 'Erro desconhecido');
      }
      const data = await r.json();

      currentResult = data;
      currentYear = data.year;

      setStatus('success', 'Recuperado · ' + data.year + ' · ' + Math.round((data.confidence||0)*100) + '% confiança');
      setConfidence(data.confidence);
      renderResult(data);
      loadHistory();

    } catch(e) {
      setStatus('error', e.message || 'Erro ao recuperar página.');
    }

    document.getElementById('recoverBtn').disabled = false;
  }

  function quickRecover(site) {
    document.getElementById('urlInput').value = site;
    recover(site);
  }

  function recoverYear(year) {
    const url = (currentResult?.original_url || document.getElementById('urlInput').value).trim();
    document.querySelectorAll('.tl-btn').forEach(b => {
      b.classList.toggle('active', b.textContent === year);
    });
    recover(url, year);
  }

  // ── Render result ──────────────────────────────────────────────────────

  function renderResult(data) {
    const layoutMap = {news:'📰',blog:'✍️',forum:'💬',ecommerce:'🛒',portal:'🌐',old_web:'🕸️',generic:'📄'};
    const colorMap  = {news:'#63b3ed',blog:'#a78bfa',forum:'#f6ad55',ecommerce:'#68d391',portal:'#63b3ed',old_web:'#fc8181',generic:'#718096'};

    document.getElementById('resYear').textContent = '◈ ' + data.year;
    document.getElementById('resUrl').textContent = data.original_url;

    const layout = data.semantic?.layout_type || 'generic';
    const lEl = document.getElementById('resLayout');
    lEl.textContent = (layoutMap[layout]||'📄') + ' ' + layout.toUpperCase();
    lEl.style.display = 'inline';
    lEl.style.color = colorMap[layout] || '#718096';
    lEl.style.background = (colorMap[layout]||'#718096') + '18';
    lEl.style.border = '1px solid ' + (colorMap[layout]||'#718096') + '40';

    const grade = data.score?.grade;
    if (grade) {
      const gEl = document.getElementById('resGrade');
      gEl.textContent = 'GRADE ' + grade;
      gEl.style.display = 'inline';
    }

    // Semantic grid
    const sem = data.semantic || {};
    const semItems = [
      ['Layout',    sem.layout_type||'—'],
      ['Títulos',   (sem.headings||[]).length],
      ['Links',     (sem.links||[]).length],
      ['Imagens',   (sem.images||[]).length],
      ['Forms',     sem.forms||0],
      ['Texto',     Math.round((sem.text_length||0)/1000)+'k'],
    ];
    document.getElementById('semGrid').innerHTML = semItems.map(([k,v]) =>
      `<div class="sem-item"><label>${k}</label><span>${v}</span></div>`
    ).join('');

    // Score chips
    const sc = data.score || {};
    const scoreItems = [
      ['HTML',   sc.html_integrity],
      ['CSS',    sc.css_integrity],
      ['Assets', sc.asset_integrity],
      ['Sem.',   sc.semantic_richness],
      ['Links',  sc.link_survival],
    ];
    document.getElementById('scoreRow').innerHTML = scoreItems.map(([k,v]) => {
      const pct = Math.round((v||0)*100);
      const c = pct>=70?'rgba(104,211,145,':pct>=45?'rgba(246,173,85,':'rgba(252,129,129,';
      return `<span class="score-chip" style="color:${c}1);background:${c}.08);border:1px solid ${c}.25)">${k} ${pct}%</span>`;
    }).join('') + (sc.grade ? `<span class="score-chip" style="color:var(--accent);background:var(--accent-d);border:1px solid var(--border2);font-weight:700">SCORE ${sc.grade}</span>` : '');

    document.getElementById('resultCard').style.display = 'block';
  }

  // ── Viewer ─────────────────────────────────────────────────────────────

  function openViewer() {
    if (!currentResult?.html) return;
    const clean = currentResult.html;
    const frame = document.getElementById('viewer-frame');
    const doc = frame.contentDocument;
    doc.open(); doc.write(clean); doc.close();

    document.getElementById('viewer-year').textContent = '◈ ' + (currentResult.year||'?');
    document.getElementById('viewer-url').textContent = currentResult.original_url||'';
    document.getElementById('viewer-archive').href = currentResult.snapshot_url||'#';
    const grade = currentResult.score?.grade;
    const gEl = document.getElementById('viewer-grade');
    if (grade) { gEl.textContent = 'GRADE '+grade; gEl.style.display='inline'; }
    else gEl.style.display = 'none';

    document.getElementById('viewer').classList.remove('hidden');
    document.body.style.overflow = 'hidden';
  }

  function closeViewer() {
    document.getElementById('viewer').classList.add('hidden');
    document.body.style.overflow = '';
  }

  // ── History ────────────────────────────────────────────────────────────

  async function loadHistory() {
    try {
      const r = await fetch(API + '/api/history?limit=8');
      const data = await r.json();
      const items = data.history || [];
      if (!items.length) return;
      const list = document.getElementById('histList');
      list.innerHTML = items.map(item => {
        const pct = Math.round((item.confidence||0)*100);
        const confColor = pct>=70?'var(--green)':pct>=45?'var(--amber)':'var(--red)';
        return `<button class="hist-item" onclick="quickRecover('${item.url}')">
          <span class="chip chip-green" style="font-size:10px">${(item.timestamp||'????').slice(0,4)}</span>
          <span class="hist-url">${item.url}</span>
          ${pct>0?`<span style="font-family:var(--mono);font-size:10px;color:${confColor};flex-shrink:0">${pct}%</span>`:''}
        </button>`;
      }).join('');
      document.getElementById('historySection').style.display = 'block';
    } catch(e) {}
  }

  // ── Init ───────────────────────────────────────────────────────────────
  loadHistory();
  document.getElementById('urlInput').focus();
</script>
</body>
</html>
